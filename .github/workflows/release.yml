name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir dist
          GOOS=darwin  GOARCH=arm64 go build -o dist/valla-cli_darwin_arm64     ./cmd/valla
          GOOS=darwin  GOARCH=amd64 go build -o dist/valla-cli_darwin_amd64     ./cmd/valla
          GOOS=linux   GOARCH=arm64 go build -o dist/valla-cli_linux_arm64      ./cmd/valla
          GOOS=linux   GOARCH=amd64 go build -o dist/valla-cli_linux_amd64      ./cmd/valla
          GOOS=windows GOARCH=amd64 go build -o dist/valla-cli_windows_amd64.exe ./cmd/valla

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
