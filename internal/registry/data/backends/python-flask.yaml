id: python-flask
name: Python (Flask)
type: backend
runtime: python3
group: Python
requires_runtime: python3
scaffold_cmd: "sh -c 'mkdir -p {{.ScaffoldName}} && cd {{.ScaffoldName}} && python3 -m venv venv && . venv/bin/activate && pip install flask flask-cors python-dotenv && pip freeze > requirements.txt'"
default_port: 5000
env_vars:
  - PORT
  - DB_HOST
  - DB_PORT
  - DB_USER
  - DB_PASSWORD
  - DB_NAME
cors_patch:
  file: app.py
  marker: "# valla:cors"
  template: |
    CORS(app, origins=["http://localhost:{{.FrontendPort}}"])
post_scaffold_files:
  - path: app.py
    template: internal/registry/data/post-scaffold/python-flask-app.py.tmpl
docker:
  image: python:3.12-slim
  build_context: ./backend
  dockerfile: internal/registry/data/dockerfiles/python-flask.Dockerfile
