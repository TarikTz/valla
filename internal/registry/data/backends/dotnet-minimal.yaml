id: dotnet-minimal
name: .NET Minimal API
type: backend
runtime: dotnet
group: .NET
requires_runtime: dotnet
scaffold_cmd: "dotnet new web -n {{.ProjectName}}-backend --output {{.ScaffoldName}}"
default_port: 5000
env_vars:
  - PORT
  - DB_HOST
  - DB_PORT
  - DB_USER
  - DB_PASSWORD
  - DB_NAME
post_scaffold_files:
  - path: Program.cs
    template: internal/registry/data/post-scaffold/dotnet-minimal-program.cs.tmpl
docker:
  image: mcr.microsoft.com/dotnet/aspnet:8.0
  build_context: ./backend
  dockerfile: internal/registry/data/dockerfiles/dotnet.Dockerfile
