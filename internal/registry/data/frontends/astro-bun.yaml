id: astro-bun
name: Astro
type: frontend
runtime: bun
group: Astro
requires_runtime: bun
scaffold_cmd: "bunx create-astro@latest {{.ScaffoldName}} -- --template basics --no-install --no-git --yes"
default_port: 4321
server_side: true
http_client_patch:
  file: src/lib/api.ts
  mode: create
  template: |
    export const API_BASE = import.meta.env.PUBLIC_API_URL ?? 'http://localhost:{{.BackendPort}}'
docker:
  image: oven/bun:1
  build_context: ./frontend
  dockerfile: internal/registry/data/dockerfiles/bun-frontend.Dockerfile
  env_vars:
    PUBLIC_API_URL: "http://localhost:{{.BackendPort}}"
