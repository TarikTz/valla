id: tanstack-bun
name: TanStack Start
type: frontend
runtime: bun
group: TanStack Start
requires_runtime: bun
scaffold_cmd: "bunx --bun @tanstack/cli@latest create {{.ScaffoldName}} --framework react --no-git --no-install"
default_port: 3000
server_side: true
http_client_patch:
  file: app/api.ts
  mode: create
  template: |
    export const API_BASE = import.meta.env.VITE_API_URL ?? 'http://localhost:{{.BackendPort}}'
docker:
  image: oven/bun:1
  build_context: ./frontend
  dockerfile: internal/registry/data/dockerfiles/bun-tanstack.Dockerfile
  env_vars:
    VITE_API_URL: "http://localhost:{{.BackendPort}}"
